<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QTA Todo App</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>QTA Todo List</h1>
        </header>
        
        <div class="todo-input">
            <input type="text" id="todoInput" placeholder="Add a new task..." maxlength="255">
            <button id="addBtn">Add Task</button>
        </div>
        
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>
        
        <div class="todo-list" id="todoList">
            <!-- Todo items will be dynamically inserted here -->
        </div>
        
        <div class="stats">
            <span id="totalTasks">0</span> total tasks, 
            <span id="completedTasks">0</span> completed
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
